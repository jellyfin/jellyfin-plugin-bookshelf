name: '🔀 PR Rebase Command'

on:
  repository_dispatch:
    types:
      - rebase-command

jobs:
  call:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/command-rebase.yaml@3e7e3bfc493a71e2dc9523127de0982a24639a0c # master
    with:
      rebase-head: ${{ github.event.client_payload.pull_request.head.label }}
      repository-full-name: ${{ github.event.client_payload.github.payload.repository.full_name }}
      comment-id: ${{ github.event.client_payload.github.payload.comment.id }}
    secrets:
      token: ${{ secrets.JF_BOT_TOKEN }}
