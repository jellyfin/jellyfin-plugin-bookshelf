name: '📝 Create/Update Release Draft & Release Bump PR'

on:
  push:
    branches:
      - master
    paths-ignore:
      - build.yaml
  workflow_dispatch:
  repository_dispatch:
    types:
      - update-prep-command

jobs:
  call:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/changelog.yaml@3e7e3bfc493a71e2dc9523127de0982a24639a0c # master
    with:
      repository-name: jellyfin/jellyfin-plugin-bookshelf
    secrets:
      token: ${{ secrets.JF_BOT_TOKEN }}
