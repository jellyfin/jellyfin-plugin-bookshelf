name: '🚀 Publish (Unstable) Plugin'

on:
  push:
    branches:
      - unstable
  workflow_dispatch:

jobs:
  call:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/publish-unstable.yaml@3e7e3bfc493a71e2dc9523127de0982a24639a0c # master
    secrets:
      deploy-host: ${{ secrets.REPO_HOST }}
      deploy-user: ${{ secrets.REPO_USER }}
      deploy-key: ${{ secrets.REPO_KEY }}
      token: ${{ secrets.JF_BOT_TOKEN }}
