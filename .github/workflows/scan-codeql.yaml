name: '🔬 Run CodeQL'

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
  schedule:
    - cron: '24 2 * * 4'
  workflow_dispatch:

jobs:
  call:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/scan-codeql.yaml@3e7e3bfc493a71e2dc9523127de0982a24639a0c # master
    with:
      repository-name: jellyfin/jellyfin-plugin-bookshelf
